<!-- Updated HTML with vibrant mesh enhancements -->
<!-- NOTE: Only key upgraded sections shown fully; rest remains identical -->

<script>
/* ── ENHANCED MESH CANVAS BACKGROUND ── */
const canvas = document.getElementById('mesh-bg');
const ctx = canvas.getContext('2d');
let nodes = [], W, H, mouse = {x:null,y:null};

function resizeCanvas() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); initNodes(); });

window.addEventListener('mousemove', (e)=>{
  mouse.x = e.x;
  mouse.y = e.y;
});

function initNodes() {
  nodes = [];
  const count = Math.floor((W * H) / 20000);
  for (let i = 0; i < count; i++) {
    nodes.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.4,
      vy: (Math.random() - 0.5) * 0.4,
      r: Math.random() * 2 + 1.5,
      color: Math.random() > 0.7 ? '#00ff88' : '#00e5ff',
      pulse: Math.random() * Math.PI * 2,
      depth: Math.random() * 3
    });
  }
}
initNodes();

function drawMesh() {
  ctx.clearRect(0, 0, W, H);
  const isHero = window.scrollY < window.innerHeight;
  const maxDist = isHero ? 200 : 140;

  nodes.forEach(n => {
    n.x += n.vx * (0.5 + n.depth);
    n.y += n.vy * (0.5 + n.depth);
    n.pulse += 0.02;

    if (mouse.x !== null) {
      const dx = n.x - mouse.x;
      const dy = n.y - mouse.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 120) {
        n.vx += dx * 0.0005;
        n.vy += dy * 0.0005;
      }
    }

    if (n.x < 0 || n.x > W) n.vx *= -1;
    if (n.y < 0 || n.y > H) n.vy *= -1;
  });

  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const dx = nodes[i].x - nodes[j].x;
      const dy = nodes[i].y - nodes[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);

      if (dist < maxDist) {
        const alpha = (1 - dist/maxDist) * 0.2;
        const hue = 180 + Math.sin(nodes[i].pulse) * 40;

        ctx.beginPath();
        ctx.moveTo(nodes[i].x, nodes[i].y);
        ctx.lineTo(nodes[j].x, nodes[j].y);
        ctx.strokeStyle = `hsla(${hue}, 100%, 60%, ${alpha})`;
        ctx.lineWidth = 0.6;
        ctx.stroke();
      }
    }
  }

  nodes.forEach(n => {
    const pr = n.r + Math.sin(n.pulse) * 1.2;

    ctx.beginPath();
    ctx.arc(n.x, n.y, pr, 0, Math.PI * 2);
    ctx.fillStyle = n.color;

    ctx.shadowBlur = 12;
    ctx.shadowColor = n.color;

    ctx.globalAlpha = 0.3 + (n.depth * 0.2);
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  });

  // SIGNAL PULSES
  if (Math.random() < 0.02) {
    const n1 = nodes[Math.floor(Math.random() * nodes.length)];
    const n2 = nodes[Math.floor(Math.random() * nodes.length)];

    const progress = (Date.now() % 1000) / 1000;

    const x = n1.x + (n2.x - n1.x) * progress;
    const y = n1.y + (n2.y - n1.y) * progress;

    ctx.beginPath();
    ctx.arc(x, y, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = '#00ffcc';
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#00ffcc';
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  requestAnimationFrame(drawMesh);
}

drawMesh();
</script>

<style>
/* BACKGROUND UPGRADE */
body {
  background: radial-gradient(circle at 30% 20%, #071c30, #040d1a 60%);
}
</style>
